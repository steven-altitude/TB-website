backend:
  name: git-gateway
  branch: master

# Netlify Identity auth
publish_mode: editorial_workflow

media_folder: "src/assets/img/blog"
public_folder: "/assets/img/blog"

locale: "es"

collections:

  # ── Blog posts in Spanish ──────────────────────────────────────────────────
  - name: "blog_es"
    label: "Blog – Español"
    label_singular: "Artículo (ES)"
    folder: "src/posts/es"
    create: true
    slug: "{{slug}}"
    preview_path: "es/blog/{{slug}}/"
    fields:
      - { label: "Título",          name: "title",     widget: "string" }
      - { label: "Fecha",           name: "date",      widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Autor/a",         name: "author",    widget: "string", default: "Tesserae Buró de Abogados" }
      - { label: "Extracto",        name: "excerpt",   widget: "text",   required: false, hint: "Resumen corto (máx. 2 oraciones) para la vista previa del blog." }
      - { label: "Imagen destacada",name: "image",     widget: "image",  required: false }
      - { label: "Alt de la imagen",name: "image_alt", widget: "string", required: false }
      - { label: "Etiquetas",       name: "tags",      widget: "list",   required: false, hint: "Ej: arbitraje, energía, corporativo" }
      - { label: "Contenido",       name: "body",      widget: "markdown" }

  # ── Blog posts in English ──────────────────────────────────────────────────
  - name: "blog_en"
    label: "Blog – English"
    label_singular: "Article (EN)"
    folder: "src/posts/en"
    create: true
    slug: "{{slug}}"
    preview_path: "en/blog/{{slug}}/"
    fields:
      - { label: "Title",           name: "title",     widget: "string" }
      - { label: "Date",            name: "date",      widget: "datetime", format: "YYYY-MM-DD", date_format: "MM/DD/YYYY", time_format: false }
      - { label: "Author",          name: "author",    widget: "string", default: "Tesserae Buró de Abogados" }
      - { label: "Excerpt",         name: "excerpt",   widget: "text",   required: false, hint: "Short summary (max 2 sentences) for the blog preview." }
      - { label: "Featured Image",  name: "image",     widget: "image",  required: false }
      - { label: "Image Alt Text",  name: "image_alt", widget: "string", required: false }
      - { label: "Tags",            name: "tags",      widget: "list",   required: false }
      - { label: "Content",         name: "body",      widget: "markdown" }
